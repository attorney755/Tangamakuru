services:
  - type: web
    name: tangamakuru
    runtime: python
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt
      chmod +x startup.sh
      echo "Running database migrations (with force)..."
      flask db stamp head || echo "Migrations already applied"
    startCommand: gunicorn wsgi:app
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: UPLOAD_FOLDER
        value: /opt/render/project/src/uploads
